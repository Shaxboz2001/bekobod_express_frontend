<!DOCTYPE html>
<html lang="uz-Cyrl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#1a1a2e" />
    <title>Bekobod Express</title>
    <!-- Telegram Web App SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        /* Telegram WebApp uchun: tg.viewportHeight'ga ishonish, fallback uchun 100vh */
        height: 100%;
        overflow-x: hidden;
      }

      body {
        font-family: 'Inter', sans-serif;
        background: var(--tg-theme-bg-color, #f4f6f9);
        color: var(--tg-theme-text-color, #1a1a2e);
        /* iOS overscroll bounce'ni o'chirish (Telegram WebApp uchun) */
        overscroll-behavior-y: none;
        -webkit-overflow-scrolling: touch;
      }

      #root {
        min-height: 100%;
        position: relative;
      }

      /*
        Telegram WebApp Drawer fix:
        Telegram'ning native overlay'i bilan to'qnashishni oldini olish uchun
        body'ga overflow: hidden qo'yilsa ham scroll'ga ta'sir qilmaydi.
      */
      body.drawer-open {
        overflow: hidden;
        position: fixed;
        width: 100%;
      }
    </style>
  </head>
  <body>
    <noscript>JavaScript kerak</noscript>
    <div id="root"></div>
  </body>
</html>
